# =============================================================================
#  ZENENATION E-COMMERCE BACKEND — MAIN CONFIGURATION
# =============================================================================

spring:
  application:
    name: zenenation-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # DATABASE
  datasource:
    url:               ${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
    username:          ${DB_USERNAME:postgres}
    password:          ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name:         ZenenationHikariPool
      minimum-idle:      2
      maximum-pool-size: 5
      idle-timeout:      300000
      connection-timeout: 20000
      max-lifetime:      1200000
      keepalive-time:    60000

  # JPA / HIBERNATE
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect:       org.hibernate.dialect.PostgreSQLDialect
        format_sql:    true
        default_schema: public
        jdbc:
          batch_size:  20
        order_inserts: true
        order_updates: true

  # FLYWAY
  flyway:
    enabled:             true
    baseline-on-migrate: true
    locations:           classpath:db/migration
    schemas:             public
    out-of-order:        false
    validate-on-migrate: false
    repair-on-migrate:   true

  # GOOGLE OAUTH2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id:     ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # MAIL — SMTP kept for future use (Resend HTTP API is active sender)
  mail:
    host:     ${MAIL_HOST:smtp-relay.brevo.com}
    port:     ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-brevo-smtp-key}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 10000
          timeout:           10000
          writetimeout:      10000

  # FILE UPLOAD
  servlet:
    multipart:
      enabled:          true
      max-file-size:    10MB
      max-request-size: 50MB

  # JACKSON
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans:       false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# SERVER
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message:        always
    include-binding-errors: always
    whitelabel:
      enabled: false
  compression:
    enabled:   true
    mime-types: application/json,application/xml,text/html

# RESEND — HTTP Email API (primary sender, works on Render free tier)
# Get API key from: https://resend.com/api-keys
resend:
  api-key: ${RESEND_API_KEY:re_your_api_key_here}
  from:     ${MAIL_FROM:Zenenation <noreply@zenenation.in>}

# JWT
jwt:
  secret:                   ${JWT_SECRET}
  access-token-expiration:  ${JWT_ACCESS_EXPIRATION:86400000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# CLOUDINARY
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dhypbyizx}
  api-key:    ${CLOUDINARY_API_KEY:your-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:your-api-secret}
  folders:
    products:   zenenation/products
    categories: zenenation/categories

# RAZORPAY
razorpay:
  key-id:         ${RAZORPAY_KEY_ID:your-razorpay-key-id}
  key-secret:     ${RAZORPAY_KEY_SECRET:your-razorpay-key-secret}
  currency:       INR
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:your-webhook-secret}

# ACTUATOR
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
  info:
    env:
      enabled: true

# SWAGGER
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path:                     /swagger-ui.html
    tags-sorter:              alpha
    operations-sorter:        alpha
    display-request-duration: true
  show-actuator: false

# APP
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - ${FRONTEND_URL:http://localhost:5173}

  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

  admin:
    email:    ${ADMIN_EMAIL:zenenationstore@gmail.com}
    password: ${ADMIN_PASSWORD:changeme}

  pagination:
    default-page-size: 12
    max-page-size:     50

  order:
    cod-max-amount: 10000

# LOGGING
logging:
  level:
    root:                             INFO
    com.zenenation:                   DEBUG
    org.springframework.security:     INFO
    org.hibernate.SQL:                INFO
    org.hibernate.type.descriptor.sql: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/zenenation.log
