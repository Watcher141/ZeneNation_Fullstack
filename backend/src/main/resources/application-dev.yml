# =============================================================================
#  DEV PROFILE — Local development overrides only
#  DO NOT include spring.profiles.active here
# =============================================================================

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.zenenation.backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    csrf:
      enabled: false