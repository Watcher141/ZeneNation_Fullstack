# =============================================================================
#  PROD PROFILE — Overrides for production (Render + Neon)
# =============================================================================

spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  # Neon free tier supports max 5 connections
  datasource:
    hikari:
      minimum-idle:       2
      maximum-pool-size:  5

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root:                    WARN
    com.zenenation.backend:  INFO
    org.springframework.security: WARN
    org.hibernate.SQL:       WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

server:
  forward-headers-strategy: framework